[project]
name = "aro-schema"
version = "0.2.3"
description = "Object model for agent runtime observability: tasks, runs, evidence, policy decisions."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aro_schema"]
