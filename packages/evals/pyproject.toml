[project]
name = "aro-evals"
version = "0.1.0"
description = "Golden-task evals and replay regression for agent runs."
requires-python = ">=3.11"
dependencies = ["aro-schema", "aro-runtime"]

[tool.uv.sources]
aro-schema = { workspace = true }
aro-runtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aro_evals"]
