[project]
name = "aro-telemetry"
version = "0.1.0"
description = "OpenTelemetry spans and Prometheus metrics for agent runs."
requires-python = ">=3.11"
dependencies = [
    "aro-schema",
    "aro-runtime",
    "opentelemetry-sdk>=1.25",
    "opentelemetry-exporter-otlp-proto-http>=1.25",
    "prometheus-client>=0.20",
]

[tool.uv.sources]
aro-schema = { workspace = true }
aro-runtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aro_telemetry"]
