[project]
name = "aro-runtime"
version = "0.1.0"
description = "Deterministic scripted agent runtime with policy gating, trace recording, and replay."
requires-python = ">=3.11"
dependencies = ["aro-schema", "pyyaml>=6"]

[tool.uv.sources]
aro-schema = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aro_runtime"]
