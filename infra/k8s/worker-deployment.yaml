# Optional reference manifest. Note: the worker's emptyDir is separate from the
# API pod's, so they do not share a database here -- suitable for demos only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aro-worker
  namespace: aro
  labels:
    app.kubernetes.io/name: aro-worker
    app.kubernetes.io/part-of: agent-runtime-observatory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aro-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aro-worker
        app.kubernetes.io/part-of: agent-runtime-observatory
    spec:
      containers:
        - name: worker
          image: ghcr.io/haeliotang/agent-runtime-observatory:latest
          command: ["python", "-m", "aro_worker"]
          ports:
            - name: metrics
              containerPort: 9100
          env:
            - name: ARO_DATA_DIR
              value: /data
            - name: ARO_WORKER_METRICS_PORT
              value: "9100"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
