services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aro
      POSTGRES_PASSWORD: aro
      POSTGRES_DB: aro
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aro -d aro"]
      interval: 2s
      timeout: 2s
      retries: 15

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: agent-runtime-observatory:latest
    ports:
      - "8000:8000"
    environment:
      ARO_DATA_DIR: /data
      ARO_DATABASE_URL: postgresql://aro:aro@postgres:5432/aro
    volumes:
      - aro-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: agent-runtime-observatory:latest
    command: ["python", "-m", "aro_worker"]
    environment:
      ARO_DATA_DIR: /data
      ARO_DATABASE_URL: postgresql://aro:aro@postgres:5432/aro
      ARO_WORKER_METRICS_PORT: "9100"
    volumes:
      - aro-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  aro-data:
  pg-data:
