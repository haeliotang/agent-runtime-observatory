name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  version-consistency:
    # Software identity must agree with itself and, on a release tag, with the
    # tag — catching the "tag says v0.2.4 but the package still reports 0.2.3"
    # class of drift at release time, not after publish.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: All versions agree (packages, FastAPI app, web) and match the tag
        run: |
          set -euo pipefail
          root=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "root version: $root"
          bad=0
          for f in packages/*/pyproject.toml apps/api/pyproject.toml apps/worker/pyproject.toml; do
            v=$(grep -m1 '^version = ' "$f" | cut -d'"' -f2)
            [ "$v" = "$root" ] || { echo "MISMATCH $f: $v != $root"; bad=1; }
          done
          app=$(grep -oE 'version="[0-9]+\.[0-9]+\.[0-9]+"' apps/api/aro_api/main.py | head -1 | cut -d'"' -f2)
          [ "$app" = "$root" ] || { echo "MISMATCH FastAPI app: $app != $root"; bad=1; }
          web=$(grep -m1 '"version"' apps/web/package.json | cut -d'"' -f4)
          [ "$web" = "$root" ] || { echo "MISMATCH web: $web != $root"; bad=1; }
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/v}"
            [ "$tag" = "$root" ] || { echo "MISMATCH tag v$tag != version $root"; bad=1; }
          fi
          [ "$bad" = "0" ] && echo "versions consistent ($root)"
          exit "$bad"

  clinic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked --all-packages
      - run: uv run --all-packages pytest packages/clinic/tests -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run pytest tests/unit -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run pytest tests/integration -q

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aro
          POSTGRES_PASSWORD: aro
          POSTGRES_DB: aro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aro -d aro"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    env:
      ARO_TEST_DATABASE_URL: postgresql://aro:aro@localhost:5432/aro
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run pytest tests/integration/test_postgres_store.py -q

  golden-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run pytest tests/replay -q
      - run: uv run python -m aro_evals examples

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  compose-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the observability stack
        run: docker compose -f infra/docker-compose.yml up -d --build --wait --wait-timeout 180
      - name: End-to-end smoke through the Postgres queue
        run: |
          set -euo pipefail
          curl -fsS localhost:8000/healthz | jq -e '.status == "ok"'

          RID=$(curl -fsS -X POST localhost:8000/api/runs \
            -H 'content-type: application/json' \
            -d '{"example":"policy-violation-run","mode":"queued"}' | jq -r '.run_id')
          echo "queued run: $RID"

          for _ in $(seq 1 30); do
            s=$(curl -fsS "localhost:8000/api/runs/$RID" | jq -r '.run.status')
            echo "status: $s"
            [ "$s" = "completed" ] && break
            sleep 2
          done

          curl -fsS "localhost:8000/api/runs/$RID" > run.json
          jq -e '.run.status == "completed"' run.json
          jq -e '.run.verdict == "blocked"' run.json
          jq -e '([.run.policy_decisions[] | select(.decision == "deny")] | length) == 2' run.json
          echo "run completed through the Postgres queue: blocked, 2 denials"

          # A sync run executes inside the api process (the queued one ran in the
          # worker), so the api's own /metrics registry gets an aro_runs_total sample.
          curl -fsS -X POST localhost:8000/api/runs \
            -H 'content-type: application/json' \
            -d '{"example":"coding-agent-run"}' | jq -e '.run.status == "completed"' >/dev/null
          curl -fsS localhost:8000/metrics | grep -q '^aro_runs_total'
          echo "metrics exposed"

          for _ in $(seq 1 20); do
            if curl -fsS 'localhost:9090/api/v1/targets' | jq -e '
                  ([.data.activeTargets[] | {(.labels.job): .health}] | add) as $j
                  | $j["aro-api"] == "up" and $j["aro-worker"] == "up"' >/dev/null; then
              echo "prometheus scraping aro-api and aro-worker"; break
            fi
            echo "waiting for prometheus scrape..."; sleep 3
          done
          curl -fsS 'localhost:9090/api/v1/targets' | jq -e '
            ([.data.activeTargets[] | {(.labels.job): .health}] | add) as $j
            | $j["aro-api"] == "up" and $j["aro-worker"] == "up"'
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --tail 200
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  release-evidence:
    # A source-consistency gate, not just an asset-availability check: on every
    # push it checks out the CURRENT source, downloads the published credential-packet-v1
    # packet by fixed URL + pinned SHA, verifies the files<->MANIFEST<->provenance
    # chain, confirms the packet's bundled verdict script is byte-identical to
    # the current source, and reproduces the verdict table. Red CI if the
    # published evidence drifts from the pinned digest OR from current source.
    runs-on: ubuntu-latest
    env:
      PACKET_URL: https://github.com/haeliotang/agent-runtime-observatory/releases/download/credential-packet-v1/credential_packet_v1.tar.gz
      PACKET_SHA: af6e4142299b58cbfbeb67b3b357a6e438c272f7e074ee17b9c8e012a4dd01f1
    steps:
      - uses: actions/checkout@v4
      - name: Download the published packet (credential-packet-v1) and check the pinned SHA
        run: |
          set -euo pipefail
          curl -fsSL "$PACKET_URL" -o packet.tar.gz
          echo "$PACKET_SHA  packet.tar.gz" | sha256sum -c -
      - name: Verify chain, provenance, source-consistency, and reproduce
        run: |
          set -euo pipefail
          tar xzf packet.tar.gz
          cd credential_packet_v1
          # 1. files <-> MANIFEST: every bundled file hashes to its recorded sha256
          jq -r '.files[] | .sha256 + "  " + .path' MANIFEST.json | sha256sum -c -
          # 2. provenance <-> MANIFEST: every provenance source is a MANIFEST file
          #    with the same sha (closes the report -> manifest -> file chain)
          jq -r '.files[] | "\(.path) \(.sha256)"' MANIFEST.json | sort > /tmp/man.txt
          jq -r '.provenance[]
                 | (if .source and .sha256 then "models/\(.source) \(.sha256)" else empty end),
                   (.lineage_sources[]? | select(.present) | "models/\(.source) \(.sha256)")' \
            provenance.json | sort -u > /tmp/prov.txt
          if [ -n "$(comm -23 /tmp/prov.txt /tmp/man.txt)" ]; then
            echo "provenance rows not backed by MANIFEST:"; comm -23 /tmp/prov.txt /tmp/man.txt; exit 1
          fi
          # 3. the published packet's verdict script == CURRENT source (no drift)
          diff run_intervention_verdict_demo.py \
            "$GITHUB_WORKSPACE/packages/clinic/scripts/run_intervention_verdict_demo.py"
          # 4. reproduce the verdict table (stock python3) + doc-drift guard
          python3 run_intervention_verdict_demo.py ./models | tee table.out >/dev/null
          grep -q "calibrated null" table.out
          grep -q "true positive" table.out
          python3 run_intervention_verdict_demo.py ./models --check-docs
